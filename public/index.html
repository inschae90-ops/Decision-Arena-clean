<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decision Arena</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.28);
      --radius: 18px;
    }

    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.12), transparent 35%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .hero {
      margin-bottom: 22px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.08;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .panel {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .composer {
      padding: 22px;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #dbeafe;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.92);
      color: var(--text);
      padding: 14px 15px;
      resize: vertical;
      font-size: 15px;
      line-height: 1.55;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.18);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #03111b;
    }

    .secondary-btn {
      background: rgba(30, 41, 59, 0.95);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .status {
      margin-top: 12px;
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .hidden {
      display: none !important;
    }

    .result-wrap {
      padding: 22px;
    }

    .summary-card {
      padding: 18px;
      background: linear-gradient(180deg, rgba(14, 165, 233, 0.12), rgba(15, 23, 42, 0.65));
      border: 1px solid rgba(56, 189, 248, 0.18);
      border-radius: 16px;
      margin-bottom: 18px;
    }

    .summary-card .winner-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 7px 12px;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.16);
      color: #dbeafe;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .summary-card h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .summary-card p {
      margin: 0;
      color: #d1d5db;
      line-height: 1.65;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .option-card {
      padding: 18px;
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 16px;
    }

    .option-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .option-top h3 {
      margin: 6px 0 0;
      font-size: 22px;
      line-height: 1.35;
      word-break: keep-all;
    }

    .option-badge {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: rgba(56, 189, 248, 0.14);
      color: #bae6fd;
      border: 1px solid rgba(56, 189, 248, 0.16);
    }

    .mini-note {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .section-title {
      margin: 18px 0 10px;
      font-size: 14px;
      color: #cbd5e1;
      letter-spacing: 0.01em;
    }

    ul,
    ol {
      margin: 0;
      padding-left: 20px;
      line-height: 1.7;
      color: #e5e7eb;
    }

    li + li {
      margin-top: 4px;
    }

    .risk-box {
      margin-top: 4px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(30, 41, 59, 0.62);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .risk-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .risk-label {
      font-size: 14px;
      color: #dbeafe;
      font-weight: 700;
    }

    .stars {
      font-size: 20px;
      letter-spacing: 2px;
      line-height: 1;
    }

    .star.filled {
      color: #fbbf24;
    }

    .star.empty {
      color: #475569;
    }

    .risk-score {
      font-size: 14px;
      color: var(--muted);
    }

    .outcome-list {
      margin-bottom: 12px;
    }

    .result-footer {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 860px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .container {
        width: min(100% - 20px, 1080px);
        padding-top: 22px;
      }

      .composer,
      .result-wrap {
        padding: 16px;
      }

      .summary-card h2 {
        font-size: 21px;
      }

      .option-top h3 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>Decision Arena</h1>
      <p>
        두 선택지를 비교해서 요약, 장단점, 총 위험도(별 1~5), 그리고 예상 결과를 단계적으로 보여줍니다.
      </p>
    </section>

    <section class="panel composer">
      <form id="compareForm">
        <div class="field">
          <label for="scenario">상황 설명</label>
          <textarea
            id="scenario"
            placeholder="예: 이직을 고민 중인데, 현재 회사에 남을지 스타트업으로 갈지 비교해줘."
            required
          ></textarea>
        </div>

        <div class="field">
          <label for="optionA">선택 A</label>
          <textarea
            id="optionA"
            placeholder="예: 현재 회사에 남는다"
            required
          ></textarea>
        </div>

        <div class="field">
          <label for="optionB">선택 B</label>
          <textarea
            id="optionB"
            placeholder="예: 스타트업으로 이직한다"
            required
          ></textarea>
        </div>

        <div class="actions">
          <button type="submit" id="compareBtn" class="primary-btn">비교하기</button>
          <button type="button" id="shareBtn" class="secondary-btn hidden">결과 공유</button>
        </div>

        <div id="status" class="status"></div>
      </form>
    </section>

    <section id="resultSection" class="panel result-wrap hidden"></section>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
